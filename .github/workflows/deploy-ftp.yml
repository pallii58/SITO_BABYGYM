name: Deploy theme to Aruba FTP

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}BABYGYM/
          # Stato sync fuori dalla cartella tema (non resta in BABYGYM/ sul server)
          state-name: ../.ftp-deploy-babygym-sync-state.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .ftp-deploy-sync-state.json
            **/.ftp-deploy-sync-state.json
            **/.github/**
          log-level: minimal
